name: Pylint

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/*.py'
  pull_request:
    branches: [main]
    paths:
      - '**/*.py'

jobs:
  pylint:
    name: Pylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pylint
      - name: Run
        run: |
          find . -type f -name '*.py' \
            | xargs pylint
